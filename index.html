<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>නිස්සරණය කරා — දේශනා සෙවුම</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1F3864">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="නිස්සරණය කරා">
<style>
  :root {
    --navy: #1F3864; --blue: #2E5597; --light: #EEF2F8; --border: #D9E1EC;
    --text: #222; --muted: #777; --hl: #ffe58a; --bg: #fafbfd; --card: #fff;
    --link: #0b5cad; --title: #1F3864; --h2: #2E5597;
  }
  html[data-theme="dark"] {
    --navy: #16233f; --blue: #7da4e0; --light: #232a38; --border: #333c4d;
    --text: #d8dce4; --muted: #8b94a5; --hl: #7a6410; --bg: #12151b; --card: #1a1f29;
    --link: #79b0ea; --title: #a9c4ee; --h2: #8fb0e2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--text);
    font-family: "Nirmala UI", "Noto Sans Sinhala", "Iskoola Pota", sans-serif;
    background: var(--bg); line-height: 1.55;
  }
  header {
    background: var(--navy); color: #fff; padding: 14px 18px 0 18px;
    position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .hrow { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  header h1 { margin: 0 0 4px 0; font-size: 1.25rem; font-weight: 600; }
  header h1 a { color: #fff; text-decoration: none; }
  header .sub { font-size: .8rem; opacity: .75; margin-bottom: 8px; }
  .themebtn {
    background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.3);
    border-radius: 8px; padding: 4px 12px; cursor: pointer; font: inherit; font-size: .85rem;
    flex-shrink: 0;
  }
  nav { display: flex; gap: 4px; flex-wrap: wrap; }
  nav button {
    background: transparent; color: #cfd9ea; border: none; cursor: pointer;
    font: inherit; font-size: .95rem; padding: 9px 16px;
    border-radius: 8px 8px 0 0;
  }
  nav button.active { background: var(--bg); color: var(--title); font-weight: 700; }
  main { max-width: 980px; margin: 0 auto; padding: 18px; }
  .searchbox {
    width: 100%; padding: 11px 14px; font: inherit; font-size: 1.05rem;
    border: 2px solid var(--border); border-radius: 10px; outline: none;
    background: var(--card); color: var(--text);
  }
  .searchbox:focus { border-color: var(--blue); }
  .hint { color: var(--muted); font-size: .85rem; margin: 6px 2px 14px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 10px;
  }
  .plist { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .plist .card { cursor: pointer; margin: 0; transition: box-shadow .15s, border-color .15s; overflow: hidden; padding-top: 10px; display: flex; flex-direction: column; }
  .plist .card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(46,85,151,.15); }
  .plist .card .t { font-weight: 700; color: var(--title); }
  .plist .card .c { color: var(--muted); font-size: .85rem; margin-top: 4px; }
  .pmeta { min-width: 0; }
  .pcover { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; margin-bottom: 8px; background: var(--light); flex-shrink: 0; }
  /* compact rows on phones: small cover left, text right → many lists per screen */
  @media (max-width: 600px) {
    .plist { grid-template-columns: 1fr; gap: 6px; }
    .plist .card { flex-direction: row; align-items: center; gap: 10px; padding: 7px 10px; }
    .pcover { width: 88px; margin-bottom: 0; }
    .plist .card .t { font-size: .9rem; line-height: 1.3; }
    .plist .card .c { font-size: .75rem; margin-top: 1px; }
  }
  a { color: var(--link); word-break: break-all; }
  .vrow { display: flex; gap: 12px; align-items: flex-start; }
  .thumb { width: 128px; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--light); }
  .vbody { flex: 1; min-width: 0; }
  .vt { font-weight: 700; color: var(--title); font-size: 1.02rem; }
  .vt a { color: var(--title); text-decoration: none; }
  .vt a:hover { text-decoration: underline; }
  .vt.watched a { opacity: .6; }
  .vurl { font-size: .85rem; margin: 3px 0 6px; }
  .desc { white-space: pre-wrap; font-size: .92rem; color: var(--text); border-top: 1px dashed var(--border); margin-top: 8px; padding-top: 8px; }
  details > summary { cursor: pointer; color: var(--blue); font-size: .88rem; user-select: none; margin-top: 6px; }
  .crumb { margin-bottom: 14px; }
  .crumb button, .abtn {
    background: var(--light); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 14px; cursor: pointer; font: inherit; color: var(--title);
  }
  .actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .actions button {
    background: var(--light); border: 1px solid var(--border); border-radius: 8px;
    padding: 3px 10px; cursor: pointer; font: inherit; font-size: .85rem; color: var(--text);
  }
  .actions button.on { background: var(--navy); color: #fff; border-color: var(--navy); }
  .playerbox { margin-top: 10px; }
  .playerbox iframe { width: 100%; aspect-ratio: 16/9; border: 0; border-radius: 8px; }
  .ph { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .ph h2 { color: var(--title); margin: 4px 0; font-size: 1.2rem; }
  .count { color: var(--muted); font-size: .9rem; }
  mark { background: var(--hl); padding: 0 1px; color: inherit; }
  .tag {
    display: inline-block; background: var(--light); color: var(--blue);
    border-radius: 6px; padding: 1px 8px; font-size: .78rem; margin: 2px 4px 0 0;
    text-decoration: none; cursor: pointer;
  }
  .sutta-name { font-weight: 700; color: var(--title); font-size: 1.05rem; }
  .sutta-links { font-size: .85rem; margin: 4px 0 8px; }
  .sv { font-size: .92rem; margin: 2px 0; }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  .topbtn {
    position: fixed; right: 18px; bottom: 18px; background: var(--navy); color: #fff;
    border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer;
    font-size: 1.1rem; display: none; box-shadow: 0 2px 8px rgba(0,0,0,.25); z-index: 20;
  }
  footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 20px; }
  .si-toolbar { display: flex; gap: 8px; align-items: center; margin: 8px 0 2px; flex-wrap: wrap; }
  .si-toggle {
    font: inherit; font-size: .85rem; padding: 5px 12px; cursor: pointer;
    border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--muted);
  }
  .si-toggle.on { background: var(--navy); color: #fff; border-color: var(--navy); }
  .si-preview { font-size: 1rem; color: var(--title); font-weight: 700; min-height: 1.3em; }
  .si-kbd { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px; margin: 8px 0; }
  .si-kbd-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .si-key {
    font-family: inherit; font-size: 1.05rem; min-width: 40px; padding: 6px 4px; cursor: pointer;
    border: 1px solid var(--border); border-radius: 6px; background: var(--light); color: var(--text);
  }
  .si-key:hover { background: var(--border); }
  .si-help { font-size: .78rem; color: var(--muted); margin-top: 4px; }
  .recent-strip { margin-bottom: 12px; }
  .recent-strip .rlabel { font-size: .85rem; color: var(--muted); cursor: pointer; user-select: none; margin: 0; }
  .recent-strip summary.rlabel { list-style-position: inside; }
  .rchip {
    display: inline-block; background: var(--light); border: 1px solid var(--border);
    color: var(--title); border-radius: 8px; padding: 3px 10px; margin: 2px 4px 2px 0;
    font-size: .85rem; cursor: pointer; max-width: 100%; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom;
  }
  .sechead { color: var(--title); font-size: 1.1rem; font-weight: 700; margin: 18px 0 8px; }
  #toast {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 70px;
    background: var(--navy); color: #fff; padding: 8px 18px; border-radius: 20px;
    font-size: .9rem; display: none; z-index: 30; box-shadow: 0 2px 10px rgba(0,0,0,.3);
  }
  /* mobile: no video thumbnails, full-width text, compact icon-only action buttons */
  @media (max-width: 700px) {
    .vrow .thumb { display: none; }
    .vrow { gap: 0; }
    .card { padding: 9px 12px; margin-bottom: 8px; }
    .vt { font-size: .95rem; line-height: 1.35; }
    .vurl { font-size: .75rem; margin: 2px 0 4px; }
    .actions { gap: 8px; margin-top: 6px; }
    .actions button { padding: 3px 12px; font-size: .95rem; }
    .actions .albl { display: none; }
  }
  /* --- mobile: bottom tab bar, slim one-line header --- */
  #bottomnav { display: none; }
  @media (max-width: 700px) {
    header { padding: 8px 14px; }
    header nav { display: none; }
    header .sub { display: none; }
    header h1 { font-size: 1.02rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .themebtn { padding: 2px 10px; font-size: .8rem; }
    main { padding: 12px 12px 84px 12px; }
    footer { padding-bottom: 84px; }
    .topbtn { bottom: 78px; }
    #toast { bottom: 120px; }
    #bottomnav {
      display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
      background: var(--navy); box-shadow: 0 -2px 8px rgba(0,0,0,.25);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #bottomnav button {
      flex: 1; background: transparent; border: none; cursor: pointer;
      color: #b9c6dd; font: inherit; padding: 7px 2px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
    }
    #bottomnav button.active { color: #fff; font-weight: 700; }
    #bottomnav .bi { font-size: 1.15rem; line-height: 1.1; }
    #bottomnav .bl { font-size: .68rem; }
    #bottomnav button.active .bl { text-decoration: underline; text-underline-offset: 3px; }
  }
</style>
</head>

  <div class="hrow">
    <h1><a href="#deshana">නිස්සරණය කරා I Nissaranaya Kara</a></h1>
    <button class="themebtn" id="themebtn" type="button">🌙</button>

    <button id="tab-search" onclick="go('search')">දේශනා නම් සහ අන්තර්ගතය සෙවීම</button>

    <button id="tab-playlists" onclick="go('playlists')">සියළු YouTube ධාවන ලැයිස්තු (Playlists)</button>

  <button id="btab-search" onclick="go('search')"><span class="bi">🔍</span><span class="bl">සෙවීම</span></button>
  <button id="btab-suttas" onclick="go('suttas')"><span class="bi">📜</span><span class="bl">සූත්‍ර</span></button>
  <button id="btab-playlists" onclick="go('playlists')"><span class="bi">📃</span><span class="bl">Playlists</span></button>

<button class="topbtn" id="topbtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
'use strict';
const D = window.NKDATA;
const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const vURL = (id) => 'https://www.youtube.com/watch?v=' + id;
const pURL = (id) => 'https://www.youtube.com/playlist?list=' + id;

// ---------- persistent state (localStorage) ----------
const LS = {
  get(k, dflt) { try { const v = localStorage.getItem('nk.' + k); return v === null ? dflt : JSON.parse(v); } catch (e) { return dflt; } },
  set(k, v) { try { localStorage.setItem('nk.' + k, JSON.stringify(v)); } catch (e) {} },
};
let singlishOn = LS.get('singlish', true);
const favs = new Set(LS.get('favs', []));
const watched = new Set(LS.get('watched', []));
let recent = LS.get('recent', []);   // [{t:'p'|'v', id}]
const saveFavs = () => LS.set('favs', [...favs]);
const saveWatched = () => LS.set('watched', [...watched]);
const saveRecent = () => LS.set('recent', recent.slice(0, 12));

// ---------- dark mode ----------
function applyTheme(dark) {
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  $('themebtn').textContent = dark ? '☀️' : '🌙';
  LS.set('dark', dark);
}
$('themebtn').addEventListener('click', () =>
  applyTheme(document.documentElement.dataset.theme !== 'dark'));
applyTheme(LS.get('dark', window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches));

// ---------- toast ----------
let toastTimer;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 1800);
}

// ---------- normalization ----------
const norm = (s) => s.normalize('NFC').replace(/[‌‍]/g, '').toLowerCase();
const VN = {};
const VP = {};
D.playlists.forEach((p, pi) => p.v.forEach(vid => (VP[vid] = VP[vid] || []).push(pi)));
for (const [vid, v] of Object.entries(D.videos)) VN[vid] = { t: norm(v.t), d: norm(v.d) };

$('fstats').textContent = 'නිස්සරණය කරා YouTube නාලිකාවෙන් 📁 Playlists ' + D.playlists.length + ' | 🎥 වීඩියෝ ' + Object.keys(D.videos).length + ' | 📜 සූත්‍ර ' + D.suttas.length;

// ---------- deshana tab ordering ----------
const tnorm = (s) => s.normalize('NFC').replace(/[\s"“”‌‍~]+/g, '').toLowerCase();
const DESHANA_PINNED = ['චතුරාර්‍ය සත්‍යය දේශනා මාලාව','සුත්‍ර විග්‍රහය','දහම් කරුණු - කෙටියෙන්','පැන විසඳුම්',
  '"සියළු දෘෂ්ටි බිඳ සෝවාන් වීමට..." දේශනා මාලාව','"අස්සාදයේ ආදීනව දැකීම" දේශනා මාලාව',
  'කලණ ගුණ රැකුමට - දේශනා මාලාව','පැටලෙන්නට පෙර විමසන්න','ගැටෙන්න නොව නිවෙන්නට','වැදගත් දහම් කරුණු',
  'පටිච්චසමුප්පාදය දේශනා මාලාව','මනට ධම්ම එන්නේ කොහෙන්ද ?','චිත්ත නිර්මාණය','මනෝද්වාරික චිත්ත වීථි',
  'කර්මස්ථාන විග්‍රහ කිරීම්','නව සජීව විකාශ සහ දේශනා'].map(tnorm);
const DESHANA_EXCLUDED = ['සත්බුදු වන්දනාව - Dec. 2020','නිස්සරණය කරා කළණ සෙනසුන','පුණ්‍යානුමෝදනා',
  'බුද්ධ පූජා සහ ආශීර්වාද පූජා','ආරම පූජාවේ පුණ්‍යානුමෝදනා','ආර්ය කර්මස්ථාන භාවනා'].map(tnorm);
const DESHANA_LIST = (() => {
  const byNorm = {};
  D.playlists.forEach((p, i) => { byNorm[tnorm(p.t)] = i; });
  const pinned = DESHANA_PINNED.map(n => byNorm[n]).filter(i => i !== undefined);
  const used = new Set([...pinned, ...DESHANA_EXCLUDED.map(n => byNorm[n]).filter(i => i !== undefined)]);
  const rest = D.playlists.map((_, i) => i).filter(i => !used.has(i));
  return [...pinned, ...rest];
})();

// ---------- highlighting ----------
function normMap(orig) {
  const nfc = orig.normalize('NFC');
  let normStr = '';
  const map = [];
  for (let i = 0; i < nfc.length; i++) {
    const ch = nfc[i];
    if (ch === '‌' || ch === '‍') continue;
    normStr += ch.toLowerCase();
    map.push(i);
  }
  return { nfc, normStr, map };
}
function highlight(orig, terms) {
  if (typeof terms === 'string') terms = terms ? [terms] : [];
  if (!terms.length) return esc(orig);
  const { nfc, normStr, map } = normMap(orig);
  const ranges = [];
  for (const t of terms) {
    let idx = 0;
    while ((idx = normStr.indexOf(t, idx)) !== -1) {
      ranges.push([map[idx], map[idx + t.length - 1] + 1]);
      idx += t.length;
    }
  }
  if (!ranges.length) return esc(nfc);
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (const r of ranges.slice(1)) {
    const last = merged[merged.length - 1];
    if (r[0] <= last[1]) last[1] = Math.max(last[1], r[1]);
    else merged.push(r);
  }
  let out = '', pos = 0;
  for (const [s, e] of merged) {
    out += esc(nfc.slice(pos, s)) + '<mark>' + esc(nfc.slice(s, e)) + '</mark>';
    pos = e;
  }
  return out + esc(nfc.slice(pos));
}
function snippet(desc, terms, span = 90) {
  if (typeof terms === 'string') terms = terms ? [terms] : [];
  const { nfc, normStr, map } = normMap(desc);
  let at = -1, tlen = 0;
  for (const t of terms) {
    const i = normStr.indexOf(t);
    if (i !== -1 && (at === -1 || i < at)) { at = i; tlen = t.length; }
  }
  if (at === -1) return null;
  const s = Math.max(0, map[at] - span), e = Math.min(nfc.length, map[at] + tlen + span);
  return (s > 0 ? '…' : '') + nfc.slice(s, e).replace(/\n+/g, ' ') + (e < nfc.length ? '…' : '');
}

// playlists are stored by their permanent YouTube playlist ID (safe across data updates)

}).filter(Boolean);
saveRecent();

function addRecent(t, id) {

function recentChips(max) {

// ---------- video actions (play / fav / watched / share) ----------
function actionsBar(vid) {

    <button type="button" onclick="playVid('${vid}')">▶<span class="albl"> මෙතන අහන්න (play)</span></button>

    <button type="button" class="${watched.has(vid) ? 'on' : ''}" onclick="toggleWatched('${vid}',this)">✓<span class="albl"> ${watched.has(vid) ? 'අසා ඇත' : 'අසා ඇති ලෙස ලකුණු'}</span></button>

function playVid(vid) {
  const box = $('player-' + vid);

  // close other players
  document.querySelectorAll('.playerbox').forEach(b => { if (b !== box) b.innerHTML = ''; });
  box.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;

function shareUrl(url) {
  if (navigator.share) { navigator.share({ url }).catch(() => {}); return; }
  (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject()).then(
    () => toast('Link copied ✓'),

}

// ---------- routing ----------
function go(view, arg, from) {
  let h = view;
  if (arg !== undefined) h += '/' + arg;
  if (from) h += '/' + from;
  if ('#' + h === location.hash) render(); else location.hash = h;
}
window.addEventListener('hashchange', render);

function setTab(name) {
  for (const t of ['playlists', 'deshana', 'suttas', 'search', 'mine']) {
    $('tab-' + t).classList.toggle('active', t === name);
    const b = $('btab-' + t);
    if (b) b.classList.toggle('active', t === name);
  }
}

// scroll memory (per hash, per session)
let scrollTimer;
window.addEventListener('scroll', () => {
  $('topbtn').style.display = window.scrollY > 600 ? 'block' : 'none';
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    try { sessionStorage.setItem('nk.scroll.' + location.hash, String(window.scrollY)); } catch (e) {}
  }, 150);
});
function restoreScroll() {
  let y = 0;
  try { y = Number(sessionStorage.getItem('nk.scroll.' + location.hash) || 0); } catch (e) {}
  requestAnimationFrame(() => window.scrollTo(0, y));
}

function render() {
  const [view, arg, from] = location.hash.replace(/^#/, '').split('/');
  const m = $('main');
  LS.set('lastTab', location.hash);
  if (view === 'playlist' && arg !== undefined) {
    const src = ['deshana', 'suttas', 'search', 'playlists', 'mine'].includes(from) ? from : 'playlists';
    setTab(src === 'mine' ? 'mine' : src);
    m.innerHTML = rPlaylist(+arg, src);
    if (D.playlists[+arg]) addRecent('p', D.playlists[+arg].id);
    bindFilter('vfilter', 'v', (q) => rPlaylistVideos(+arg, q), 'pl-videos');
  }
  else if (view === 'playlists') { setTab('playlists'); m.innerHTML = rPlaylistIndex(); bindFilter('pfilter', 'p', rPlaylistCards, 'pl-grid'); }
  else if (view === 'suttas') { setTab('suttas'); m.innerHTML = rSuttas(); bindFilter('sfilter', 's', rSuttasList, 'sutta-list'); }
  else if (view === 'search') { setTab('search'); m.innerHTML = rSearch(); bindSearch(); }
  else if (view === 'mine') { setTab('mine'); m.innerHTML = rMine(); }
  else { setTab('deshana'); m.innerHTML = rDeshanaIndex(); bindFilter('dfilter', 'd', q => rPlaylistCards(q, DESHANA_LIST, 'deshana'), 'de-grid'); }
  restoreScroll();
}

    <div class="hint">මාතෘකා සහ විස්තර දෙකෙහිම සොයයි · partial words match (උදා: "අනිච්" ⇒ අනිච්ච, අනිච්ඡ, අනිච්චානුපස්සනා...,  "සූත්‍ර" ⇒ සූත්‍රය, සූත්‍රයේ…)</div>

function bindSearch() {
  const q = $('q');
  let timer;
  const trigger = () => { clearTimeout(timer); timer = setTimeout(doSearch, 200); };
  q.addEventListener('input', trigger);
  const tgl = $('si-toggle');
  const setLabel = () => {
    tgl.textContent = 'සිං Singlish: ' + (singlishOn ? 'ON' : 'OFF');
    tgl.classList.toggle('on', singlishOn);
  };
  setLabel();
  tgl.addEventListener('click', () => { singlishOn = !singlishOn; LS.set('singlish', singlishOn); setLabel(); q.focus(); doSearch(); });
  const kbox = $('si-kbd-box');
  window.SinhalaIME.buildKeyboard(kbox, q, trigger);
  $('si-kbd-toggle').addEventListener('click', () => {
    kbox.style.display = kbox.style.display === 'none' ? 'block' : 'none';
  });
  q.focus();
  if (q.value.trim()) doSearch();
}
function doSearch() {
  const raw = $('q').value.trim();
  LS.set('lastQ', raw);
  const conv = singlishOn ? window.SinhalaIME.translit(raw) : raw;
  $('si-preview').textContent = (conv && conv !== raw) ? '→ ' + conv : '';
  const terms = norm(conv).split(/\s+/).filter(t => t.length >= 2);
  const R = $('results');
  if (!terms.length) { R.innerHTML = '<div class="empty">අවම වශයෙන් අකුරු 2ක් ටයිප් කරන්න</div>'; return; }
  const hits = [];
  for (const [vid, n] of Object.entries(VN)) {
    let tCount = 0, ok = true;
    for (const t of terms) {
      if (n.t.includes(t)) tCount++;
      else if (!n.d.includes(t)) { ok = false; break; }
    }
    if (ok) hits.push({ vid, tCount });
  }
  hits.sort((a, b) => b.tCount - a.tCount);
  let html = `<div class="hint">${hits.length} results${terms.length > 1 ? ' · සියලු වචන අඩංගු වීඩියෝ (all words must appear)' : ''}</div>`;
  for (const h of hits.slice(0, 300)) {
    const v = D.videos[h.vid];
    const sn = h.tCount < terms.length ? snippet(v.d, terms) : null;
    html += videoRow(h.vid, {
      terms, tags: true, from: 'search',
      snippetHtml: sn ? `<div class="desc">${highlight(sn, terms)}</div>` : '',
    });
  }
  if (!hits.length) html = '<div class="empty">ගැළපීම් නොමැත — වෙනත් වචනයක් උත්සාහ කරන්න</div>';
  R.innerHTML = html;
}

    ${favRows || '<div class="hint">වීඩියෝ එකතු කිරීමට ⭐ බොත්තම ඔබන්න</div>'}
    <div class="sechead">✓ අසා ඇති දේශනා (watched) — ${watched.size}</div>
    <details ${watched.size && watched.size <= 10 ? 'open' : ''}><summary>බලන්න (show list)</summary>${watchedRows || '<div class="hint">තවම කිසිවක් නැත</div>'}</details>`;
}

// ---------- shared IME toolbar ----------
function imeBar(prefix) {
  return `<div class="si-toolbar">
      <button id="${prefix}-si-toggle" class="si-toggle" type="button">සිං Singlish: ON</button>
      <button id="${prefix}-si-kbd-toggle" class="si-toggle" type="button">⌨ යතුරු පුවරුව (keyboard)</button>
      <span id="${prefix}-si-preview" class="si-preview"></span>
    </div>
    <div id="${prefix}-si-kbd-box" style="display:none"></div>`;
}
function setupIME(inputId, prefix, onChange) {
  const q = $(inputId);
  const tgl = $(prefix + '-si-toggle');
  const setLabel = () => {
    tgl.textContent = 'සිං Singlish: ' + (singlishOn ? 'ON' : 'OFF');
    tgl.classList.toggle('on', singlishOn);
  };
  setLabel();
  tgl.addEventListener('click', () => { singlishOn = !singlishOn; LS.set('singlish', singlishOn); setLabel(); q.focus(); onChange(); });
  const kbox = $(prefix + '-si-kbd-box');
  window.SinhalaIME.buildKeyboard(kbox, q, onChange);
  $(prefix + '-si-kbd-toggle').addEventListener('click', () => {
    kbox.style.display = kbox.style.display === 'none' ? 'block' : 'none';
  });
  return () => {
    const raw = q.value.trim();
    const conv = singlishOn ? window.SinhalaIME.translit(raw) : raw;
    $(prefix + '-si-preview').textContent = (conv && conv !== raw) ? '→ ' + conv : '';
    return conv;
  };
}
function bindFilter(inputId, prefix, renderFn, targetId) {
  const el = $(inputId);
  if (!el) return;
  let timer, getConv;
  const apply = () => { $(targetId).innerHTML = renderFn(norm(getConv())); };
  const trigger = () => { clearTimeout(timer); timer = setTimeout(apply, 150); };
  getConv = setupIME(inputId, prefix, trigger);
  el.addEventListener('input', trigger);
}

// ---------- start ----------
if (!location.hash) {
  const last = LS.get('lastTab', '');
  if (last && last !== '#') { location.hash = last; }
}
render();

// Register service worker (only when served over http/https — skipped for local file:// use)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
